name: Mirror Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: '镜像列表(逗号分隔)'
        required: true
        default: 'agent0ai/agent-zero:latest'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull and Push Images
        run: |
          IFS=',' read -ra IMGS <<< "${{ github.event.inputs.images }}"
          for img in "${IMGS[@]}"; do
            img=$(echo "$img" | xargs)
            echo "=== Processing $img ==="
            docker pull "$img"
            # Create new tag under your account
            name=$(echo "$img" | sed 's|.*/||' | sed 's/:/-/g')
            docker tag "$img" "${{ secrets.DOCKER_USERNAME }}/$name:latest"
            docker push "${{ secrets.DOCKER_USERNAME }}/$name:latest"
            echo "=== Done: $img -> ${{ secrets.DOCKER_USERNAME }}/$name:latest ==="
          done
